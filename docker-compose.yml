services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Host port mapping removed to avoid conflicts with a local Postgres.
    # The bot connects internally via the "postgres" service name.
    # To inspect from your PC, either re-add a mapping like "5433:5432"
    # or run: docker compose exec postgres psql -U marketplace -d marketplace


  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Host port mapping removed to avoid conflict with a local Redis already
    # using 6379. The bot connects internally via the "redis" service name.


  bot:
    build: .
    container_name: marketplace_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./backups:/app/backups

volumes:
  postgres_data:
  redis_data:
